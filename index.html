<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>カードゲーム</title>
<link rel="stylesheet" href="style.css">
</head>


<body>

<div id="game">


<!-- タイトル画面 -->

<section id="titleScreen">

<h1>🎴 カードゲーム</h1>

<button onclick="openMenu()">
対戦開始
</button>

<button onclick="openMenu()">
メニュー
</button>


</section>




<!-- メインメニュー -->

<section id="menuScreen" class="hide">

<h1>カードゲーム</h1>


<button onclick="openBattle()">
対戦する
</button>


<button onclick="openDeckEdit()">
デッキ編集
</button>


<button onclick="openCardList()">
カード一覧
</button>


<button onclick="openTutorial()">
チュートリアル
</button>


<button onclick="openSetting()">
設定
</button>


<button onclick="gameEnd()">
終了
</button>


</section>





<!-- 共通画面 -->

<section id="subScreen" class="hide">

<h1 id="subTitle"></h1>

<div id="subContent"></div>


<button onclick="backMenu()">
戻る
</button>


</section>


</div>


<script src="game.js"></script>

</body>

</html>
