<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>オリジナールカードゲーム</title>
<link rel="stylesheet" href="style.css">
</head>


<body>

<div id="game">


<div class="status">

<div>
相手LP：
<span id="enemyLP">8000</span>
</div>

<div>
相手コスト：
<span id="enemyCost">2</span>
</div>

</div>



<div class="field" id="enemy-field">
相手モンスターエリア
</div>



<div class="field" id="enemy-spell">
相手魔法・トラップエリア
</div>



<div class="field" id="grave">

墓地

</div>



<div class="field" id="player-field">

自分モンスターエリア

</div>



<div class="field" id="player-spell">

自分魔法・トラップエリア

</div>



<div class="hand" id="hand">

</div>



<div class="status">


<div>
自分LP：
<span id="playerLP">8000</span>
</div>


<div>
コスト：
<span id="cost">1</span>
</div>


<button onclick="endTurn()">
ターン終了
</button>


</div>



</div>


<script src="script.js"></script>

</body>

</html>
