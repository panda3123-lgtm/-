<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>オリジナールカードゲーム</title>
<link rel="stylesheet" href="style.css">
</head>


<body>


<div id="game">


<!-- 相手情報 -->
<div class="status enemy">

<span>
相手LP：
<span id="enemyLP">8000</span>
</span>

<span>
相手コスト：
<span id="enemyCost">2</span>
</span>

</div>



<!-- 相手モンスター -->
<div class="field" id="enemy-field">
相手モンスターエリア
</div>



<!-- 相手魔法罠 -->
<div class="field" id="enemy-spell">
相手魔法・トラップエリア
</div>



<!-- 自分魔法罠 -->
<div class="field" id="player-spell">
自分魔法・トラップエリア
</div>



<!-- 自分モンスター -->
<div class="field" id="player-field">
自分モンスターエリア
</div>



<!-- 手札 -->
<div class="hand" id="hand">
</div>



<!-- 自分情報 -->
<div class="status player">

<span>
自分LP：
<span id="playerLP">8000</span>
</span>


<span>
自分コスト：
<span id="cost">1</span>
</span>


<button onclick="endTurn()">
ターン終了
</button>


</div>



</div>


<script src="script.js"></script>


</body>

</html>
